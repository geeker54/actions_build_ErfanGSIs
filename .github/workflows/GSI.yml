name: Build GSI from Mounted & Modified system.img

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: '刷机包下载链接 (zip)'
        required: true
        type: string
      firmware_type:
        description: '固件类型 (MIUI, OxygenOS, ...)'
        required: true
        default: 'MIUI'
      output_type:
        description: '输出类型 (ab / aonly / both)'
        required: true
        default: 'both'
        type: choice
        options:
          - ab
          - aonly
          - both

env:
  TOOL_REPO: "https://github.com/erfanoabdi/ErfanGSIs.git"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安装依赖（包含 ErfanGSIs 所需的全部工具）
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget unzip xz-utils \
            python3-pip brotli lzip android-sdk-libsparse-utils \
            e2fsprogs p7zip-full
          pip3 install backports.lzma protobuf

      # 下载 sdat2img 工具
      - name: Download sdat2img
        run: |
          wget https://raw.githubusercontent.com/xpirt/sdat2img/master/sdat2img.py
          chmod +x sdat2img.py

      # 下载刷机包
      - name: Download firmware zip
        run: |
          wget -O firmware.zip "${{ github.event.inputs.firmware_url }}"

      # 解压刷机包
      - name: Extract firmware
        run: |
          mkdir firmware_extracted
          unzip firmware.zip -d firmware_extracted

      # 转换 system.new.dat.br → system.img
      - name: Convert to system.img
        run: |
          cd firmware_extracted
          SYSTEM_DAT_BR=$(find . -name "system.new.dat.br" | head -n 1)
          if [ -z "$SYSTEM_DAT_BR" ]; then
            echo "Error: system.new.dat.br not found!"
            exit 1
          fi
          cp "$SYSTEM_DAT_BR" ./system.new.dat.br
          brotli -d system.new.dat.br -o system.new.dat
          
          TRANSFER_LIST=$(find . -name "system.transfer.list" | head -n 1)
          cp "$TRANSFER_LIST" ./system.transfer.list
          
          python3 ../sdat2img.py system.transfer.list system.new.dat system.img
          mv system.img ../system_raw.img
          cd ..

      # 挂载 system.img 并允许自定义修改
      - name: Mount and modify system.img
        run: |
          mkdir -p /mnt/system
          sudo mount -o loop system_raw.img /mnt/system
          
          # 在这里添加你的自定义修改，例如删除应用、替换文件等
          # sudo rm -rf /mnt/system/app/Chrome
          # sudo cp some_file /mnt/system/
          
          echo "✅ system.img mounted at /mnt/system - you can modify files here"
          # 为了演示，我们创建一个标记文件
          sudo touch /mnt/system/.modified_by_github_actions
          
          # 卸载，保存修改
          sudo umount /mnt/system
          echo "✅ Unmounted, modifications saved in system_raw.img"

      # 克隆 ErfanGSIs
      - name: Clone ErfanGSIs
        run: |
          git clone --recurse-submodules ${{ env.TOOL_REPO }} ErfanGSIs
          cd ErfanGSIs && chmod +x *.sh && bash setup.sh

      # 使用 img2GSI.sh 从修改后的 system.img 构建 GSI
      - name: Build GSI from modified system.img
        run: |
          cd ErfanGSIs
          OUTPUT_TYPE="${{ github.event.inputs.output_type }}"
          
          if [ "$OUTPUT_TYPE" == "both" ]; then
            echo "Building both A-Only and A/B images..."
            bash img2GSI.sh ../system_raw.img aonly
            bash img2GSI.sh ../system_raw.img ab
          else
            bash img2GSI.sh ../system_raw.img "$OUTPUT_TYPE"
          fi

      # 上传生成的 GSI 文件
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GSI-Builds
          path: ErfanGSIs/output/*.img
          if-no-files-found: error
          retention-days: 7
