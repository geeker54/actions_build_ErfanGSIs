name: Build GSI from ROM Package (No setup.sh)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'ROM 刷机包直链'
        required: true
        type: string
      rom_type:
        description: 'ROM 类型'
        required: true
        type: choice
        options:
          - Stock
          - MIUI
          - ColorOS
          - OneUI
          - Flyme
          - Generic
        default: 'Generic'
      output_type:
        description: '输出分区类型'
        required: true
        type: choice
        options:
          - all        # Aonly + AB
          - ab         # 仅 AB
          - a          # 仅 Aonly
        default: 'ab'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            android-sdk-libsparse-utils \
            e2fsprogs \
            xz-utils \
            unzip \
            wget \
            brotli \
            python3 \
            python-is-python3 \
            python3-protobuf

      - name: 克隆 ErfanGSIs 并手动准备工具
        run: |
          git clone --depth=1 https://github.com/erfanoabdi/ErfanGSIs.git
          chmod -R 755 ErfanGSIs
          cd ErfanGSIs

          # 创建工具目录并下载 sdat2img.py
          mkdir -p tools
          wget -O tools/sdat2img.py https://raw.githubusercontent.com/xpirt/sdat2img/master/sdat2img.py
          chmod +x tools/sdat2img.py

          # ---------- 替代 setup.sh：下载 ErfanGSIs 的二进制工具包 ----------
          # 创建工具存放目录
          mkdir -p bin
          # 下载 tools.tar.xz（ErfanGSIs 官方依赖，此链接可能需更新）
          wget -q https://github.com/erfanoabdi/ErfanGSIs/releases/download/tools/tools.tar.xz
          tar -xf tools.tar.xz -C bin/
          # 设置可执行权限
          chmod +x bin/*
          # 将 bin 加入 PATH（后续 make.sh 会用到）
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: 下载 ROM 包并提取 system.img
        run: |
          cd ErfanGSIs
          mkdir -p rom_tmp output
          wget -O rom.zip "${{ github.event.inputs.rom_url }}"

          if unzip -q rom.zip -d rom_tmp; then
            echo "ZIP 解压成功"
          elif tar -xf rom.zip -C rom_tmp; then
            echo "TAR 解压成功"
          else
            echo "无法解压 ROM 包"
            exit 1
          fi

          cd rom_tmp
          if find . -name "system.img" -type f | grep -q .; then
            cp $(find . -name "system.img" -type f | head -1) ../system.img
          elif [ -f system.new.dat.br ] && [ -f system.transfer.list ]; then
            brotli -d system.new.dat.br -o system.new.dat
            python3 ../tools/sdat2img.py system.transfer.list system.new.dat system.img
            mv system.img ../
          else
            echo "未找到 system.img"
            exit 1
          fi
          cd ..
          rm -rf rom_tmp
          [ -f system.img ] || exit 1

      - name: 确保 system.img 为 EXT4
        run: |
          cd ErfanGSIs
          IMG_INFO=$(file system.img)
          echo "原始: $IMG_INFO"
          if echo "$IMG_INFO" | grep -qi "Android sparse image"; then
            simg2img system.img system_raw.img
            mv system_raw.img system.img
          fi
          IMG_INFO=$(file system.img)
          if ! echo "$IMG_INFO" | grep -qi "ext4"; then
            mkdir -p old_system new_system
            sudo mount -t auto -o loop system.img old_system || exit 1
            SIZE=$(sudo du -sb old_system | awk '{print $1}')
            NEW_SIZE=$(( SIZE * 12 / 10 ))
            NEW_SIZE=$(( (NEW_SIZE + 1048575) / 1048576 ))M
            truncate -s ${NEW_SIZE} system_new.img
            mkfs.ext4 system_new.img
            sudo mount -t ext4 -o loop system_new.img new_system
            sudo cp -av old_system/* new_system/
            sudo umount old_system new_system
            mv system_new.img system.img
          fi
          file system.img
          cp system.img system.img.backup

      - name: 运行 ErfanGSIs 制作 GSI
        run: |
          cd ErfanGSIs

          case "${{ github.event.inputs.rom_type }}" in
            Stock)   ROM_NUM=1 ;;
            MIUI)    ROM_NUM=2 ;;
            ColorOS) ROM_NUM=3 ;;
            OneUI)   ROM_NUM=4 ;;
            Flyme)   ROM_NUM=5 ;;
            Generic) ROM_NUM=6 ;;
            *)       ROM_NUM=6 ;;
          esac

          build_one() {
            local GSI_NUM=$1
            local TAG=$2
            echo ">>> $TAG"
            printf "%d\n%d\n" "$GSI_NUM" "$ROM_NUM" | sudo bash make.sh
            if ls output/*.img 1>/dev/null 2>&1; then
              mkdir -p output/$TAG
              mv output/*.img output/$TAG/
            fi
          }

          case "${{ github.event.inputs.output_type }}" in
            all)
              build_one 1 "Aonly"
              cp -f system.img.backup system.img
              build_one 3 "AB"
              ;;
            a) build_one 1 "Aonly" ;;
            ab) build_one 3 "AB" ;;
          esac

      - name: 上传 GSI
        uses: actions/upload-artifact@v4
        with:
          name: ErfanGSI-Output
          path: ErfanGSIs/output/**/*.img
          retention-days: 7
