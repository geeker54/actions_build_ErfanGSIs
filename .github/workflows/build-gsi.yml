name: Build GSI with ErfanGSIs

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'ROM 刷机包直链 (.zip 格式)'
        required: true
      rom_type:
        description: 'ROM 类型 (如 MIUI, ColorOS, OneUI)'
        required: true
        default: 'Generic'
      output_type:
        description: '输出分区类型 (all / ab / a)'
        required: true
        default: 'ab'
        type: choice
        options:
          - all
          - ab
          - a

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y git wget unzip xz-utils lzip python3 bash e2fsprogs

      - name: 克隆 ErfanGSIs 工具
        run: |
          git clone --recurse-submodules https://github.com/erfanoabdi/ErfanGSIs.git
          cd ErfanGSIs
          bash setup.sh

      - name: 下载 ROM 刷机包
        run: |
          cd ErfanGSIs
          wget -O input.zip "${{ github.event.inputs.rom_url }}"

      - name: 生成 GSI
        run: |
          cd ErfanGSIs
          bash url2GSI.sh input.zip "${{ github.event.inputs.rom_type }}" ${{ github.event.inputs.output_type }}

      - name: 上传 GSI 镜像
        uses: actions/upload-artifact@v4
        with:
          name: ErfanGSI-output
          path: ErfanGSIs/output/*.img
