name: Build GSI with ErfanGSIs (Treble check retained)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'ROM 刷机包直链 (.zip / .tgz)'
        required: true
      rom_type:
        description: 'ROM 类型 (如 MIUI, ColorOS, OneUI)'
        required: true
        default: 'Generic'
      output_type:
        description: '输出分区类型 (all / ab / a)'
        required: true
        default: 'ab'
        type: choice
        options:
          - all
          - ab
          - a

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y git wget unzip xz-utils lzip e2fsprogs \
            android-sdk-libsparse-utils liblzma-dev lz4 tar gcc make \
            golang-go pigz brotli
          git clone https://github.com/xpirt/sdat2img.git /tmp/sdat2img

      - name: 设置 Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install docopt protobuf pycryptodome backports.lzma

      - name: 克隆 ErfanGSIs 并初始化所有子模块
        run: |
          git clone --recurse-submodules https://github.com/erfanoabdi/ErfanGSIs.git
          cd ErfanGSIs
          # 确保所有子模块都已拉取（包括 Firmware_extractor）
          git submodule update --init --recursive
          # 修复 Go 工具（如果存在 packsparseimg.go）
          if [ -f "tools/Firmware_extractor/zui/packsparseimg.go" ]; then
            cd tools/Firmware_extractor/zui/
            go build packsparseimg.go
            chmod +x packsparseimg
            cd ../../../
          else
            echo "警告: tools/Firmware_extractor/zui/packsparseimg.go 不存在，跳过编译"
          fi
          # 给关键脚本添加执行权限
          chmod +x url2GSI.sh make.sh 2>/dev/null || true

      - name: 下载 ROM 刷机包
        run: |
          cd ErfanGSIs
          wget -O input.pkg "${{ github.event.inputs.rom_url }}"
          if file input.pkg | grep -q "gzip compressed"; then
            mv input.pkg input.tgz
          elif file input.pkg | grep -q "Zip archive"; then
            mv input.pkg input.zip
          else
            mv input.pkg input.bin
          fi
          ls -la

      - name: 生成 GSI（保留 Treble 检查）
        run: |
          cd ErfanGSIs
          if [ -f input.tgz ]; then
            bash url2GSI.sh input.tgz "${{ github.event.inputs.rom_type }}" ${{ github.event.inputs.output_type }}
          elif [ -f input.zip ]; then
            bash url2GSI.sh input.zip "${{ github.event.inputs.rom_type }}" ${{ github.event.inputs.output_type }}
          else
            bash url2GSI.sh input.bin "${{ github.event.inputs.rom_type }}" ${{ github.event.inputs.output_type }}
          fi

      - name: 上传 GSI 镜像
        uses: actions/upload-artifact@v4
        with:
          name: ErfanGSI-output
          path: ErfanGSIs/output/*.img
