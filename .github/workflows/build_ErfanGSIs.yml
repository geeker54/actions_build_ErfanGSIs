name: Build GSI using ErfanGSIs

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'ROM 包直链'
        required: true
        default: 'https://bkt-sgp-miui-ota-update-alisgp.oss-ap-southeast-1.aliyuncs.com/20.6.16/miui_MI6_20.6.16_a3973effa2_9.0.zip'
      rom_name:
        description: 'ROM 名称 (如 MIUI, ColorOS, Generic)'
        required: true
        default: 'MIUI'
      build_type:
        description: '分区类型: aonly 或 ab'
        required: true
        default: 'aonly'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git wget unzip p7zip-full lzip
          python3 -m pip install --upgrade pip

      - name: 克隆 ErfanGSIs 仓库
        run: |
          git clone --recurse-submodules https://github.com/erfanoabdi/ErfanGSIs.git
          cd ErfanGSIs
          bash setup.sh

      - name: 构建 GSI
        run: |
          cd ErfanGSIs
          # 注意参数格式：-c 表示清理旧输出，--aonly 或 --ab 指定分区类型
          sudo bash ./url2GSI.sh -c --${{ github.event.inputs.build_type }} "${{ github.event.inputs.rom_url }}" "${{ github.event.inputs.rom_name }}"
          echo "构建脚本退出码: $?"

      - name: 验证输出文件
        run: |
          cd ErfanGSIs
          echo "=== output 目录内容 ==="
          ls -lh output/ || echo "output 目录不存在"
          echo "=== 查找大文件 (>500M) ==="
          find output -type f -size +500M -exec ls -lh {} \;
          if find output -type f -name "*.img" -size +500M | grep -q .; then
            echo "✅ GSI 生成成功"
          else
            echo "❌ 未找到有效的 GSI 镜像文件"
            exit 1
          fi

      - name: 上传 GSI 产物
        uses: actions/upload-artifact@v4
        with:
          name: ErfanGSI-output
          path: ErfanGSIs/output/
          if-no-files-found: error

         
            
