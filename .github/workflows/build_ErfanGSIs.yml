name: build_ErfanGSIs

on:
#  release:
#    types: [published]
#  push:
#    branches:
#      - master
#    paths:
#      - '.config'
#  schedule:
#    - cron: 0 8 * * 5
  watch:
    types: [started]
    
env:
  ROM_URL: https://bkt-sgp-miui-ota-update-alisgp.oss-ap-southeast-1.aliyuncs.com/20.6.16/miui_MI6_20.6.16_a3973effa2_9.0.zip
  ROM_NAME: MIUI
  BUILD_TYPE: aonly
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
       - name: Checkout
         uses: actions/checkout@master
           
       - name: Initialization environment
         run: |
            sudo -E apt-get -qq install git wget
      
       - name: Clone ErfanGSI Source Code
         run: git clone --recurse-submodules https://github.com/erfanoabdi/ErfanGSIs.git ErfanGSIs
         
       - name: Fix exit
         run: |
              sed -i 's/\|\| exit 1//g' $GITHUB_WORKSPACE/ErfanGSIs/url2GSI.sh
              sed -i 's/exit 1//g' $GITHUB_WORKSPACE/ErfanGSIs/url2GSI.sh
       - name: Install system dependencies
         run: |
            sudo apt-get update
            sudo apt-get install -y python3 python3-pip build-essential

       - name: Upgrade pip
         run: python3 -m pip install --upgrade pip
          
       - name: Setting up ErfanGSI requirements
         run: |
              cd $GITHUB_WORKSPACE/ErfanGSIs
              mkdir ./output
              sed -i 's/\bpip\b/python3 -m pip/g' setup.sh
              ./setup.sh
              sudo bash ./setup.sh
       
       - name: Download Stock Rom & Generate GSI
         run: |
           cd $GITHUB_WORKSPACE/ErfanGSIs
           sudo bash ./url2GSI.sh -c $BUILD_TYPE $ROM_URL $ROM_NAME
           echo "Build script finished with exit code $?"
          

       - name: Upload full output as artifact
         uses: actions/upload-artifact@v4
         with:
              name: ErfanGSI-FullOutput
              path: ${{ github.workspace }}/ErfanGSIs/output/
              if-no-files-found: error
       
       - name: Zip GSI  
         run: |
              cd $GITHUB_WORKSPACE/ErfanGSIs/output
              mkdir final
              zip -r final/GSI.zip ./*
       
       - name: Upload GSI as Artifact
         uses: actions/upload-artifact@v4
         with:
              name: ErfanGSI-output
              path: ${{ github.workspace }}/ErfanGSIs/output/final/GSI.zip
              if-no-files-found: error

         
            
