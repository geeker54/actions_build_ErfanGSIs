name: Build GSI with ErfanGSIs (url2GSI Fixed)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'ROM 刷机包直链'
        required: true
        type: string
      rom_name:
        description: 'ROM 名称'
        required: true
        type: choice
        options:
          - Generic
          - MIUI
          - ColorOS
          - OneUI
          - Flyme
          - OxygenOS
          - Pixel
          - Moto
          - Nubia
          - Xperia
          - ZUI
          - ZenUI
        default: 'Generic'
      build_type:
        description: 'GSI 分区类型'
        required: true
        type: choice
        options:
          - Aonly
          - AB
        default: 'AB'

env:
  ROM_URL: ${{ github.event.inputs.rom_url }}
  ROM_NAME: ${{ github.event.inputs.rom_name }}
  BUILD_TYPE: ${{ github.event.inputs.build_type }}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git wget xz-utils unzip brotli \
            android-sdk-libsparse-utils \
            e2fsprogs \
            python3 python-is-python3 python3-pip

      - name: 克隆 ErfanGSIs 源码
        run: |
          git clone --recurse-submodules https://github.com/erfanoabdi/ErfanGSIs.git ErfanGSIs

      - name: 修复 url2GSI.sh 与安装依赖
        run: |
          cd ErfanGSIs

          # 1. 修复 realpath 不识别 --Aonly / --AB 的问题
          sed -i 's/realpath "\$0"/readlink -f "\$0"/g' url2GSI.sh
          sed -i 's/realpath \$0/readlink -f \$0/g' url2GSI.sh

          # 2. 修复 ROM_TYPE 识别错误
          sed -i 's/^ROM_TYPE=.*/ROM_TYPE=""/' url2GSI.sh

          # 3. 修复意外退出
          sed -i 's/|| exit 1//g' url2GSI.sh
          sed -i 's/exit 1//g' url2GSI.sh

          # 4. 修复 setup.sh 的 apt 包名
          sed -i 's/python-pip/python3-pip/g' setup.sh

          # 5. 注释掉 setup.sh 中会编译失败的 pip 安装
          sed -i 's/^[[:space:]]*pip install/#pip install/' setup.sh
          sed -i 's/^[[:space:]]*pip3 install/#pip3 install/' setup.sh

          # 6. 提前安装 pycryptodome（ubuntu-22.04 需要 --break-system-packages）
          sudo pip3 install --break-system-packages pycryptodome

          # 7. 创建输出目录并运行官方 setup (仅剩下的 apt 部分)
          mkdir -p output
          sudo bash ./setup.sh

      - name: 下载 ROM 并生成 GSI
        run: |
          cd ErfanGSIs
          # 转为小写，防止 --Aonly 出现
          TYPE_LOWER=$(echo "$BUILD_TYPE" | tr '[:upper:]' '[:lower:]')
          echo "构建类型: $TYPE_LOWER"
          sudo bash ./url2GSI.sh -c --${TYPE_LOWER} $ROM_URL $ROM_NAME

      - name: 打包 GSI
        run: |
          cd ErfanGSIs/output
          if ls *.img 1>/dev/null 2>&1; then
            mkdir -p final
            tar -zcvf final/GSI.tar.gz *.img
            echo "打包完成"
          else
            echo "未生成任何 img 文件！"
            exit 1
          fi

      - name: 上传 GSI 到 Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ErfanGSIs/output/final/GSI.tar.gz
          name: ${{ env.ROM_NAME }}-${{ env.BUILD_TYPE }}-GSI
          tag: GSI-${{ github.run_id }}
          token: ${{ secrets.GITHUB_TOKEN }}
