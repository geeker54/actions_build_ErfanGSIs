name: Build GSI with ErfanGSIs

on:
  workflow_dispatch:
    inputs:
      ROM_URL:
        description: '固件下载直链'
        required: true
        type: string
      ROM_NAME:
        description: '固件类型 (MIUI, ColorOS, OneUI, OxygenOS等)'
        required: true
        default: 'MIUI'
        type: string
      OUTPUT_TYPES:
        description: '分区类型'
        required: true
        default: 'ab'
        type: choice
        options:
          - ab
          - aonly
          - both

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (fix lzma.h missing)
        run: |
          sudo apt-get update
          # 关键：添加 liblzma-dev 和 python3-dev
          sudo apt-get install -y git wget unzip xz-utils python3-pip brotli lzip e2fsprogs liblzma-dev python3-dev
          sudo pip3 install protobuf backports.lzma

      - name: Clone ErfanGSIs
        run: |
          git clone --recurse-submodules https://github.com/erfanoabdi/ErfanGSIs.git
          cd ErfanGSIs && chmod +x *.sh

      - name: Setup environment (skip pycrypto error)
        run: |
          cd ErfanGSIs
          # 注释掉可能导致失败的 pycrypto 安装
          sudo sed -i 's/^pip install pycrypto/# pip install pycrypto/g' setup.sh
          bash setup.sh || true

      - name: Build GSI
        run: |
          cd ErfanGSIs
          ROM_URL="${{ github.event.inputs.ROM_URL }}"
          ROM_NAME="${{ github.event.inputs.ROM_NAME }}"
          OUTPUT_TYPE="${{ github.event.inputs.OUTPUT_TYPES }}"
          bash url2GSI.sh "$ROM_URL" "$ROM_NAME" "$OUTPUT_TYPE" 2>&1 | tee build.log

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GSI-Output
          path: ErfanGSIs/output/*.img
          if-no-files-found: error
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ErfanGSIs/build.log
          retention-days: 7
